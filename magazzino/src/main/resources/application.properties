
# APPLICATION
spring.application.name=magazzino

#  ORACLE DATASOURCE

spring.datasource.url=jdbc:oracle:thin:@//oracle-service:1521/XE?oracle.jdbc.timezoneAsRegion=true&sessionTimeZone=Europe/Rome
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:magazzino}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:magazzino_pdw}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

#  ERRORI FATTURA (MESSAGGI PERSONALIZZATI)

error.fattura.pagata=La fattura \u00E8 gi\u00E0 pagata interamente
error.fattura.supera=Il pagamento supererebbe l'importo totale della fattura
error.fattura.saldoNonValido=Il pagamento deve essere > 0

#  SCHEDULER FATTURE

# true = attivo   /   false = disattivo
fatture.check.enabled=true

# Esecuzione ogni giorno alle 01:00 - per ogni minuto  0 * * * * *
fatture.check.cron= 0 0 1 * * *

#  SCHEDULER INVENTARIO

# true = attivo   /   false = disattivo
jobs.inventory.enabled=false

# Ogni 5 minuti (300000 ms)
inventory.check.rate=300000

# Soglia minima fallback
inventory.min.threshold=5

# TIMEZONE APPLICAZIONE & JSON

spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Rome
spring.jackson.time-zone=Europe/Rome

# JPA / HIBERNATE

spring.jpa.hibernate.ddl-auto=update