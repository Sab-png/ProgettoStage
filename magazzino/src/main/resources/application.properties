spring.application.name=magazzino

# DATASOURCE CORRETTO
spring.datasource.url=jdbc:oracle:thin:@//oracle-xe:1521/XEPDB1?oracle.jdbc.timezoneAsRegion=true&sessionTimeZone=Europe/Rome
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:magazzino}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:magazzino_pwd}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# TIMEZONE
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Rome
spring.jackson.time-zone=Europe/Rome

# DISABILITA COMPLETAMENTE L'UPDATE SCHEMA
spring.jpa.hibernate.ddl-auto=update

# CONFIG STOCK
inventory.min.threshold=5
inventory.check.rate=300000